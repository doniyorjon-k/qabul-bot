<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Super Admin</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{--bg:var(--tg-theme-bg-color,#111113);--bg2:var(--tg-theme-secondary-bg-color,#1c1c1e);--bg3:rgba(255,255,255,.05);--txt:var(--tg-theme-text-color,#f2f2f7);--hint:var(--tg-theme-hint-color,#636366);--btn:var(--tg-theme-button-color,#0a84ff);--btn-txt:var(--tg-theme-button-text-color,#fff);--red:var(--tg-theme-destructive-text-color,#ff453a);--green:#30d158;--orange:#ff9f0a;--purple:#bf5af2;--border:rgba(255,255,255,.07)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding-bottom:72px}
    .section{display:none}.section.active{display:block}
    .pg{padding:0 14px}
    .spin{width:24px;height:24px;border:2.5px solid rgba(255,255,255,.08);border-top-color:var(--btn);border-radius:50%;animation:sp .7s linear infinite;margin:60px auto}
    @keyframes sp{to{transform:rotate(360deg)}}
    .hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
    .hdr-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
    .hdr-btn{width:34px;height:34px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);color:var(--btn);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
    .tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:20}
    .tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 10px;gap:3px;border:none;background:none;color:var(--hint);font-size:10px;font-weight:500;cursor:pointer}
    .tab.on{color:var(--btn)}
    .tab svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
    .tab.on svg{stroke-width:2.2}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px}
    .sec-t{font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.7px;margin:18px 0 8px}
    .f-lbl{font-size:12px;font-weight:500;color:var(--hint);margin-bottom:5px;display:block}
    .f-inp{background:var(--bg3);color:var(--txt);border:1px solid var(--border);border-radius:12px;padding:11px 14px;width:100%;font-size:14px;outline:none;margin-bottom:10px;-webkit-appearance:none}
    .f-inp:focus{border-color:rgba(10,132,255,.5)}
    .f-inp::placeholder{color:var(--hint)}
    select.f-inp{appearance:none}
    .pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;display:inline-block;white-space:nowrap;flex-shrink:0}
    .btn-p{background:var(--btn);color:var(--btn-txt);border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
    .btn-g{background:var(--bg3);color:var(--txt);border:1px solid var(--border);border-radius:12px;padding:12px;font-size:14px;cursor:pointer;width:100%}
    .btn-r{background:rgba(255,69,58,.12);color:var(--red);border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
    .btn-sm{padding:8px 14px;font-size:13px;border-radius:10px;width:auto}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;z-index:50}
    .modal.hidden{display:none}
    .modal-box{background:var(--bg2);border-radius:22px 22px 0 0;width:100%;padding:8px 20px 32px;max-height:88vh;overflow-y:auto}
    .modal-body{background:var(--bg2);border-radius:22px 22px 0 0;width:100%;padding:8px 20px 32px;max-height:88vh;overflow-y:auto}
    .hdl{width:36px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:0 auto 16px}
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">🔐 Super Admin</div>
  <button class="hdr-btn" onclick="refreshTab()">↻</button>
</div>

<div class="pg">
  <div id="sec-stats"    class="section active"><div id="stats-content"><div class="spin"></div></div></div>
  <div id="sec-clinics"  class="section"><div id="clinics-content"><div class="spin"></div></div></div>
  <div id="sec-payments" class="section"><div id="payments-content"><div class="spin"></div></div></div>
  <div id="sec-plans"    class="section"><div id="plans-content"><div class="spin"></div></div></div>
  <div id="sec-promos"   class="section"><div id="promos-content"><div class="spin"></div></div></div>
</div>

<!-- Bottom sheet modal -->
<div id="modal" class="modal hidden">
  <div class="modal-box" id="modal-body"><div class="hdl"></div></div>
</div>

<!-- Custom Alert / Confirm overlay -->
<div id="custom-alert" style="position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;padding:24px">
  <div style="background:var(--bg2);border-radius:18px;padding:24px;max-width:320px;width:100%;border:1px solid var(--border)">
    <p id="custom-alert-msg" style="margin:0 0 20px;font-size:15px;line-height:1.5;white-space:pre-wrap"></p>
    <div id="custom-alert-btns"></div>
  </div>
</div>

<!-- Tab Bar -->
<nav class="tab-bar">
  <button class="tab on" id="tab-stats" onclick="switchTab('stats')">
    <svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>Stats
  </button>
  <button class="tab" id="tab-clinics" onclick="switchTab('clinics')">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Klinikalar
  </button>
  <button class="tab" id="tab-payments" onclick="switchTab('payments')">
    <svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>To'lovlar
  </button>
  <button class="tab" id="tab-plans" onclick="switchTab('plans')">
    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Rejalar
  </button>
  <button class="tab" id="tab-promos" onclick="switchTab('promos')">
    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Promos
  </button>
</nav>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
const initData = tg.initData;

if (!initData) {
  document.body.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:32px;text-align:center;gap:16px">
    <div style="font-size:56px">🔒</div>
    <div style="font-size:18px;font-weight:700">Ruxsat yo'q</div>
    <div style="font-size:13px;color:var(--hint);line-height:1.6">Bu sahifani to'g'ridan-to'g'ri brauzerda ochib bo'lmaydi.<br><br>Super admin botga /start yuboring va <b>🖥 Boshqaruv Paneli</b> tugmasini bosing.</div>
  </div>`;
}

let _alertCb = null;
function showCustomAlert(msg, cb) {
  _alertCb = cb || null;
  document.getElementById('custom-alert-msg').textContent = msg;
  document.getElementById('custom-alert-btns').innerHTML =
    `<button class="btn-p" onclick="closeCustomAlert(true)">Yopish</button>`;
  document.getElementById('custom-alert').style.display = 'flex';
}
function showCustomConfirm(msg, cb) {
  _alertCb = cb || null;
  document.getElementById('custom-alert-msg').textContent = msg;
  document.getElementById('custom-alert-btns').innerHTML = `<div style="display:flex;gap:8px">
    <button class="btn-g" style="flex:1" onclick="closeCustomAlert(false)">Bekor</button>
    <button class="btn-p" style="flex:1" onclick="closeCustomAlert(true)">Tasdiqlash</button>
  </div>`;
  document.getElementById('custom-alert').style.display = 'flex';
}
function closeCustomAlert(result) {
  document.getElementById('custom-alert').style.display = 'none';
  const cb = _alertCb; _alertCb = null;
  if (cb) cb(result);
}

function api(path, opts={}) {
  return fetch('/api/super-admin'+path, {
    ...opts,
    headers:{'x-init-data':initData,'Content-Type':'application/json',...(opts.headers||{})},
  }).then(async r => {
    if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e.message||r.statusText); }
    return r.json();
  });
}

const SCLR = { trial:'#bf5af2', active:'#30d158', expired:'#ff453a', suspended:'#636366' };
const SLBL = { trial:'Sinov', active:'Faol', expired:'Tugagan', suspended:"To'xtatilgan" };
function sBadge(s) {
  const c=SCLR[s]||'#636366';
  return `<span class="pill" style="background:${c}1a;color:${c}">${SLBL[s]||s}</span>`;
}
function initials(name) { return (name||'?').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?'; }
function avatar(name,color,size=42){ return `<div style="width:${size}px;height:${size}px;border-radius:${Math.round(size*.28)}px;background:${color}1a;color:${color};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:${Math.round(size*.32)}px;flex-shrink:0">${initials(name)}</div>`; }

function openModal(html) {
  document.getElementById('modal-body').innerHTML = '<div class="hdl"></div>' + html;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }

// ── STATS ──────────────────────────────────────────────────────────────
async function loadStats() {
  const el = document.getElementById('stats-content');
  el.innerHTML = '<div class="spin"></div>';
  try {
    const s = await api('/stats');
    const [pending] = [s.pendingPayments||0];
    el.innerHTML = `
    <div style="margin:12px 0 10px">
      <div style="background:linear-gradient(135deg,rgba(10,132,255,.15),rgba(191,90,242,.1));border:1px solid rgba(10,132,255,.22);border-radius:18px;padding:20px;text-align:center;margin-bottom:10px">
        <div style="font-size:42px;font-weight:800;letter-spacing:-2px;color:var(--btn);line-height:1">${s.total}</div>
        <div style="font-size:13px;color:var(--hint);margin-top:6px">🏥 Jami klinikalar</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="card" style="margin:0;text-align:center"><div style="font-size:24px;font-weight:700;color:#bf5af2">${s.trial||0}</div><div style="font-size:11px;color:var(--hint);margin-top:3px">Sinov</div></div>
        <div class="card" style="margin:0;text-align:center"><div style="font-size:24px;font-weight:700;color:#30d158">${s.active||0}</div><div style="font-size:11px;color:var(--hint);margin-top:3px">Faol</div></div>
        <div class="card" style="margin:0;text-align:center"><div style="font-size:24px;font-weight:700;color:#ff453a">${s.expired||0}</div><div style="font-size:11px;color:var(--hint);margin-top:3px">Tugagan</div></div>
        <div class="card" style="margin:0;text-align:center"><div style="font-size:24px;font-weight:700;color:#636366">${s.suspended||0}</div><div style="font-size:11px;color:var(--hint);margin-top:3px">To'xtatilgan</div></div>
      </div>
    </div>
    <div style="background:${pending>0?'rgba(255,159,10,.12)':'var(--bg2)'};border:1px solid ${pending>0?'rgba(255,159,10,.3)':'var(--border)'};border-radius:16px;padding:16px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:22px;font-weight:700;color:${pending>0?'var(--orange)':'var(--hint)'}">${pending}</div>
        <div style="font-size:12px;color:var(--hint);margin-top:2px">💳 Kutayotgan to'lovlar</div>
      </div>
      ${pending>0?`<button class="btn-p btn-sm" onclick="switchTab('payments')">Ko'rish</button>`:''}
    </div>`;
  } catch(e) { el.innerHTML=`<p style="color:var(--red);text-align:center;margin-top:48px">${e.message}</p>`; }
}

// ── CLINICS ────────────────────────────────────────────────────────────
let allClinics=[], archivedClinics=[], clinicFilter='all';

async function loadClinics() {
  const el=document.getElementById('clinics-content');
  el.innerHTML='<div class="spin"></div>';
  try {
    [allClinics,archivedClinics]=await Promise.all([api('/clinics'),api('/clinics/archived').catch(()=>[])]);
    renderClinics();
  } catch(e) { el.innerHTML=`<p style="color:var(--red);text-align:center;margin-top:48px">${e.message}</p>`; }
}

function renderClinics() {
  const el=document.getElementById('clinics-content');
  const filters=['all','trial','active','expired','suspended','archived'];
  const flabels={all:'Barchasi',trial:'Sinov',active:'Faol',expired:'Tugagan',suspended:"To'xtatilgan",archived:'Arxiv'};
  const chips=filters.map(f=>{
    const cnt=f==='archived'?archivedClinics.length:(f==='all'?allClinics.length:allClinics.filter(c=>c.status===f).length);
    const on=f===clinicFilter;
    return `<span onclick="setFilter('${f}')" style="display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid ${on?'rgba(10,132,255,.4)':'transparent'};background:${on?'rgba(10,132,255,.15)':'var(--bg2)'};color:${on?'var(--btn)':'var(--hint)'};white-space:nowrap">${flabels[f]}${cnt?`<span style="background:${on?'var(--btn)':'rgba(255,255,255,.15)'};color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:99px">${cnt}</span>`:''}</span>`;
  }).join('');

  if (clinicFilter==='archived') {
    const cards=archivedClinics.map(c=>{
      const deletedStr=c.deletedAt?new Date(c.deletedAt).toLocaleDateString('ru-RU'):'—';
      return `<div class="card" style="opacity:.7">
        <div style="display:flex;align-items:center;gap:12px">
          ${avatar(c.name,'#636366')}
          <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px">${c.name}</div><div style="font-size:12px;color:var(--hint);margin-top:2px">O'chirilgan: ${deletedStr}</div></div>
          <span class="pill" style="background:rgba(99,99,102,.15);color:#636366">Arxiv</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn-p btn-sm" style="flex:1" onclick="restoreClinic(${c.id})">♻️ Tiklash</button>
          <button class="btn-r btn-sm" style="flex:1" onclick="permanentDeleteClinic(${c.id})">🗑 O'chirish</button>
        </div>
      </div>`;
    }).join('');
    el.innerHTML=`<div style="margin:10px 0;overflow-x:auto;display:flex;gap:6px;padding-bottom:2px">${chips}</div>${cards||'<p style="color:var(--hint);text-align:center;margin-top:32px">Arxivlangan klinikalar yo\'q</p>'}`;
    return;
  }

  const filtered=clinicFilter==='all'?allClinics:allClinics.filter(c=>c.status===clinicFilter);
  const cards=filtered.map(c=>{
    const endsAt=c.subscriptionEndsAt||c.trialEndsAt;
    const daysLeft=endsAt?Math.ceil((new Date(endsAt)-new Date())/86400000):null;
    const endsStr=endsAt?new Date(endsAt).toLocaleDateString('ru-RU'):'Cheksiz';
    const sc=SCLR[c.status]||'#636366';
    return `<div class="card" onclick="openClinicDetail(${c.id})" style="cursor:pointer">
      <div style="display:flex;align-items:center;gap:12px">
        ${avatar(c.name,sc)}
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:14px">${c.name}</div>
          <div style="font-size:12px;color:var(--hint);margin-top:2px">ID ${c.id} · ${endsStr}${daysLeft!==null?` · ${daysLeft} kun`:''}</div>
        </div>
        ${sBadge(c.status)}
      </div>
    </div>`;
  }).join('');
  el.innerHTML=`
    <div style="margin:10px 0;overflow-x:auto;display:flex;gap:6px;padding-bottom:2px">${chips}</div>
    <button class="btn-p" style="margin-bottom:12px" onclick="openNewClinicModal()">➕ Yangi klinika</button>
    ${cards||'<p style="color:var(--hint);text-align:center;margin-top:32px">Hech narsa topilmadi</p>'}`;
}

function setFilter(f) { clinicFilter=f; renderClinics(); }
function toDateInput(iso) { return iso?iso.slice(0,10):''; }

function openClinicDetail(id) {
  const c=allClinics.find(x=>x.id===id); if(!c)return;
  const trialStr=c.trialEndsAt?new Date(c.trialEndsAt).toLocaleDateString('ru-RU'):'—';
  const subStr=c.subscriptionEndsAt?new Date(c.subscriptionEndsAt).toLocaleDateString('ru-RU'):'—';
  const isSusp=c.status==='suspended';
  const sc=SCLR[c.status]||'#636366';
  openModal(`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
      ${avatar(c.name,sc,48)}
      <div><div style="font-weight:700;font-size:17px">${c.name}</div><div style="margin-top:4px">${sBadge(c.status)}</div></div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;color:var(--hint)">ID</span><b style="font-size:13px">${c.id}</b></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;color:var(--hint)">Trial muddati</span><b style="font-size:13px">${trialStr}</b></div>
      <div style="display:flex;justify-content:space-between"><span style="font-size:13px;color:var(--hint)">Obuna muddati</span><b style="font-size:13px">${subStr}</b></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      ${isSusp
        ? `<button class="btn-p" style="grid-column:span 2" onclick="clinicAction(${id},'activate')">✅ Faollashtirish</button>`
        : `<button class="btn-p btn-sm" style="padding:10px" onclick="clinicAction(${id},'unlimited')">♾️ Cheksiz</button>
           <button class="btn-g btn-sm" style="padding:10px" onclick="clinicAction(${id},'extend-trial')">➕ 7 kun</button>
           <button class="btn-r btn-sm" style="grid-column:span 2;padding:10px" onclick="clinicAction(${id},'suspend')">⛔ To'xtatish</button>`
      }
    </div>
    <button class="btn-p" style="margin-bottom:8px" onclick="loadClinicStats(${id})">📊 Statistika</button>
    <button class="btn-g" style="margin-bottom:8px" onclick="openClinicEdit(${id})">✏️ Tahrirlash</button>
    <button class="btn-r" style="margin-bottom:10px" onclick="deleteClinic(${id})">🗄 Arxivlash</button>
    <button class="btn-g" onclick="closeModal()">Yopish</button>
  `);
}

async function clinicAction(id, action) {
  try {
    await api(`/clinics/${id}/${action}`,{method:'POST'});
    closeModal(); showCustomAlert('✅ Amalga oshirildi');
    [allClinics,archivedClinics]=await Promise.all([api('/clinics'),api('/clinics/archived').catch(()=>[])]);
    renderClinics();
  } catch(e) { showCustomAlert('❌ '+e.message); }
}

async function loadClinicStats(id) {
  const c=allClinics.find(x=>x.id===id);
  openModal(`<div style="text-align:center;padding:24px 0"><div class="spin"></div><div style="font-size:13px;color:var(--hint);margin-top:8px">Yuklanmoqda...</div></div>`);
  try {
    const s=await api(`/clinics/${id}/stats`);
    const fmtAmt=n=>n?(n).toLocaleString('ru-RU')+' so\'m':'0';
    const lastPay=s.payments.lastPaymentDate?new Date(s.payments.lastPaymentDate).toLocaleDateString('ru-RU'):'—';
    openModal(`
      <div style="font-weight:700;font-size:17px;margin-bottom:16px">📊 ${c?.name||'Statistika'}</div>
      <div class="sec-t">📅 Qabullar</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div class="card" style="margin:0;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--btn)">${s.appointments.total}</div><div style="font-size:11px;color:var(--hint);margin-top:3px">Jami</div></div>
        <div class="card" style="margin:0;text-align:center"><div style="font-size:24px;font-weight:700;color:#bf5af2">${s.appointments.thisMonth}</div><div style="font-size:11px;color:var(--hint);margin-top:3px">Bu oy</div></div>
        <div class="card" style="margin:0;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--orange)">${s.appointments.pending}</div><div style="font-size:11px;color:var(--hint);margin-top:3px">Kutmoqda</div></div>
        <div class="card" style="margin:0;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--green)">${s.appointments.confirmed}</div><div style="font-size:11px;color:var(--hint);margin-top:3px">Tasdiqlangan</div></div>
        <div class="card" style="margin:0;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--btn)">${s.appointments.completed}</div><div style="font-size:11px;color:var(--hint);margin-top:3px">Bajarilgan</div></div>
        <div class="card" style="margin:0;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--red)">${s.appointments.cancelled}</div><div style="font-size:11px;color:var(--hint);margin-top:3px">Bekor</div></div>
      </div>
      <div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div><div style="font-size:11px;color:var(--hint);margin-bottom:4px">👤 Bemorlar</div><div style="font-size:22px;font-weight:700;color:var(--btn)">${s.users.total}</div></div>
        <div style="text-align:right"><div style="font-size:11px;color:var(--hint);margin-bottom:4px">⭐ O'rtacha baho</div><div style="font-size:22px;font-weight:700;color:#ff9f0a">${s.reviews.avgRating||'—'}</div></div>
      </div>
      <div class="sec-t">💳 Obuna to'lovlari</div>
      <div class="card" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;color:var(--hint)">Tasdiqlangan</span><b>${s.payments.count} ta</b></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;color:var(--hint)">Jami summa</span><b style="color:var(--green)">${fmtAmt(s.payments.totalAmount)}</b></div>
        <div style="display:flex;justify-content:space-between"><span style="font-size:13px;color:var(--hint)">Oxirgi to'lov</span><b>${lastPay}${s.payments.lastPlanName?' · '+s.payments.lastPlanName:''}</b></div>
      </div>
      <button class="btn-g" onclick="closeModal()">Yopish</button>
    `);
  } catch(e) { openModal(`<p style="color:var(--red);text-align:center;margin:32px 0">${e.message}</p><button class="btn-g" onclick="closeModal()">Yopish</button>`); }
}

async function deleteClinic(id) {
  const c=allClinics.find(x=>x.id===id);
  showCustomConfirm(`"${c?.name}" klinikasini arxivlaysizmi?\n\nBot to'xtatiladi. Arxivdan tiklash mumkin.`, async ok=>{
    if (!ok) return;
    try {
      await api(`/clinics/${id}`,{method:'DELETE'});
      closeModal(); showCustomAlert('🗄 Klinika arxivlandi');
      [allClinics,archivedClinics]=await Promise.all([api('/clinics'),api('/clinics/archived').catch(()=>[])]);
      renderClinics();
    } catch(e) { showCustomAlert('❌ '+e.message); }
  });
}

async function permanentDeleteClinic(id) {
  const c=archivedClinics.find(x=>x.id===id);
  showCustomConfirm(`⚠️ "${c?.name}" klinikasini BUTUNLAY o'chirasizmi?\n\nBarcha ma'lumotlar o'chib ketadi. Bu amalni QAYTARIB BO'LMAYDI!`, async ok=>{
    if (!ok) return;
    try {
      await api(`/clinics/${id}/permanent`,{method:'DELETE'});
      showCustomAlert('🗑 Klinika butunlay o\'chirildi');
      [allClinics,archivedClinics]=await Promise.all([api('/clinics'),api('/clinics/archived').catch(()=>[])]);
      renderClinics();
    } catch(e) { showCustomAlert('❌ '+e.message); }
  });
}

async function restoreClinic(id) {
  const c=archivedClinics.find(x=>x.id===id);
  showCustomConfirm(`"${c?.name}" klinikasini tiklamoqchimisiz?`, async ok=>{
    if (!ok) return;
    try {
      await api(`/clinics/${id}/restore`,{method:'POST'});
      showCustomAlert('✅ Klinika tiklandi');
      [allClinics,archivedClinics]=await Promise.all([api('/clinics'),api('/clinics/archived').catch(()=>[])]);
      clinicFilter='all'; renderClinics();
    } catch(e) { showCustomAlert('❌ '+e.message); }
  });
}

function openClinicEdit(id) {
  const c=allClinics.find(x=>x.id===id); if(!c)return;
  openModal(`
    <div style="font-weight:700;font-size:17px;margin-bottom:16px">✏️ Klinikani tahrirlash</div>
    <label class="f-lbl">Nomi</label><input class="f-inp" id="ec-name" value="${c.name||''}"/>
    <label class="f-lbl">User Bot Token</label><input class="f-inp" id="ec-token" value="${c.botToken||''}"/>
    <label class="f-lbl">Admin Bot Token (ixtiyoriy)</label><input class="f-inp" id="ec-admin-token" placeholder="Bo'sh qoldirsa bitta bot" value="${c.adminBotToken||''}"/>
    <label class="f-lbl">Admin IDlar (vergul bilan)</label><input class="f-inp" id="ec-admins" value="${(c.adminIds||[]).join(',')}"/>
    <label class="f-lbl">Trial tugash sanasi</label><input class="f-inp" type="date" id="ec-trial" value="${toDateInput(c.trialEndsAt)}"/>
    <label class="f-lbl">Obuna tugash sanasi</label><input class="f-inp" type="date" id="ec-sub" value="${toDateInput(c.subscriptionEndsAt)}"/>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn-g" style="flex:1" onclick="closeModal()">Bekor</button>
      <button class="btn-p" style="flex:1" onclick="saveClinicEdit(${id})">💾 Saqlash</button>
    </div>
  `);
}

async function saveClinicEdit(id) {
  const name=document.getElementById('ec-name').value.trim();
  const botToken=document.getElementById('ec-token').value.trim();
  const adminBotToken=document.getElementById('ec-admin-token').value.trim();
  const adminsRaw=document.getElementById('ec-admins').value.trim();
  const trialVal=document.getElementById('ec-trial').value;
  const subVal=document.getElementById('ec-sub').value;
  if (!name||!botToken){showCustomAlert('Nom va token kiritilishi shart');return;}
  const adminIds=adminsRaw?adminsRaw.split(',').map(Number).filter(Boolean):[];
  const body={name,botToken,adminBotToken:adminBotToken||null,adminIds,trialEndsAt:trialVal?new Date(trialVal).toISOString():null,subscriptionEndsAt:subVal?new Date(subVal).toISOString():null};
  try {
    await api(`/clinics/${id}`,{method:'PUT',body:JSON.stringify(body)});
    closeModal(); showCustomAlert('✅ Saqlandi');
    allClinics=await api('/clinics'); renderClinics();
  } catch(e){showCustomAlert('❌ '+e.message);}
}

function openNewClinicModal() {
  openModal(`
    <div style="font-weight:700;font-size:17px;margin-bottom:16px">➕ Yangi klinika</div>
    <label class="f-lbl">Nomi</label><input class="f-inp" id="nc-name" placeholder="Smile Dental"/>
    <label class="f-lbl">User Bot Token</label><input class="f-inp" id="nc-token" placeholder="123456:ABC..."/>
    <label class="f-lbl">Admin Bot Token (ixtiyoriy)</label><input class="f-inp" id="nc-admin-token" placeholder="Alohida admin bot bo'lsa"/>
    <label class="f-lbl">Admin ID (vergul bilan)</label><input class="f-inp" id="nc-admins" placeholder="123456789"/>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn-g" style="flex:1" onclick="closeModal()">Bekor</button>
      <button class="btn-p" style="flex:1" onclick="createClinic()">Yaratish</button>
    </div>
  `);
}

async function createClinic() {
  const name=document.getElementById('nc-name').value.trim();
  const token=document.getElementById('nc-token').value.trim();
  const adminToken=document.getElementById('nc-admin-token').value.trim();
  const adminsRaw=document.getElementById('nc-admins').value.trim();
  if (!name||!token){showCustomAlert('Nom va token kiritilishi shart');return;}
  const adminIds=adminsRaw?adminsRaw.split(',').map(Number).filter(Boolean):[];
  try {
    await api('/clinics',{method:'POST',body:JSON.stringify({name,botToken:token,adminBotToken:adminToken||null,adminIds})});
    closeModal(); showCustomAlert('✅ Klinika yaratildi');
    allClinics=await api('/clinics'); renderClinics();
  } catch(e){showCustomAlert('❌ '+e.message);}
}

// ── PAYMENTS ────────────────────────────────────────────────────────────
let rejectPaymentId=null;
async function loadPayments() {
  const el=document.getElementById('payments-content');
  el.innerHTML='<div class="spin"></div>';
  try {
    const payments=await api('/payments/pending');
    if (!payments.length) { el.innerHTML='<div style="text-align:center;padding:60px 16px"><div style="font-size:52px;margin-bottom:14px">💳</div><div style="font-size:17px;font-weight:700">Kutayotgan to\'lovlar yo\'q</div></div>'; return; }
    el.innerHTML=payments.map(p=>`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>
          <div style="font-weight:700;font-size:15px">💳 To'lov #${p.id}</div>
          <div style="font-size:12px;color:var(--hint);margin-top:2px">${new Date(p.createdAt).toLocaleString('ru-RU')}</div>
        </div>
        <span class="pill" style="background:rgba(255,159,10,.15);color:var(--orange)">Kutmoqda</span>
      </div>
      <div style="background:var(--bg3);border-radius:10px;padding:10px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:var(--hint)">🏥 Klinika</span><b style="font-size:13px">${p.clinic?.name||'—'}</b></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:var(--hint)">📋 Reja</span><b style="font-size:13px">${p.plan?.name||'—'}</b></div>
        <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--hint)">💰 Summa</span><b style="font-size:13px;color:var(--green)">${(p.amount||0).toLocaleString()} so'm</b></div>
      </div>
      ${p.screenshotFileId?`<div id="ss-${p.id}" style="margin-bottom:10px"><div style="font-size:12px;color:var(--hint);cursor:pointer;text-decoration:underline" onclick="loadScreenshot(${p.id})">📷 Screenshotni ko'rish</div></div>`:''}
      <div style="display:flex;gap:8px">
        <button class="btn-p btn-sm" style="flex:1;padding:10px" onclick="confirmPayment(${p.id})">✅ Tasdiqlash</button>
        <button class="btn-r btn-sm" style="flex:1;padding:10px" onclick="openRejectModal(${p.id})">❌ Rad etish</button>
      </div>
    </div>`).join('');
  } catch(e){el.innerHTML=`<p style="color:var(--red);text-align:center;margin-top:48px">${e.message}</p>`;}
}

async function loadScreenshot(id) {
  const el = document.getElementById('ss-'+id);
  if (!el) return;
  el.innerHTML = '<div style="font-size:12px;color:var(--hint)">Yuklanmoqda...</div>';
  try {
    const res = await fetch(`/api/super-admin/payments/${id}/screenshot`, {
      headers: { 'x-init-data': initData },
      redirect: 'follow',
    });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    el.innerHTML = `<img src="${url}" style="width:100%;border-radius:10px;display:block" alt="Screenshot" />`;
  } catch(e) {
    el.innerHTML = '<div style="font-size:12px;color:var(--red)">Yuklab bo\'lmadi</div>';
  }
}

async function confirmPayment(id) {
  try { await api(`/payments/${id}/confirm`,{method:'POST'}); showCustomAlert('✅ To\'lov tasdiqlandi!'); loadPayments(); }
  catch(e){showCustomAlert('❌ '+e.message);}
}
function openRejectModal(id) {
  rejectPaymentId=id;
  openModal(`
    <div style="font-weight:700;font-size:17px;margin-bottom:16px">❌ To'lov #${id} rad etish</div>
    <label class="f-lbl">Sabab</label>
    <textarea class="f-inp" id="reject-reason" rows="3" placeholder="Rad etish sababi..." style="resize:none"></textarea>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn-g" style="flex:1" onclick="closeModal()">Bekor</button>
      <button class="btn-r" style="flex:1" onclick="doReject()">Rad etish</button>
    </div>
  `);
}
async function doReject() {
  const reason=document.getElementById('reject-reason').value.trim();
  try {
    await api(`/payments/${rejectPaymentId}/reject`,{method:'POST',body:JSON.stringify({reason})});
    closeModal(); showCustomAlert('✅ Rad etildi'); loadPayments();
  } catch(e){showCustomAlert('❌ '+e.message);}
}

// ── PLANS ────────────────────────────────────────────────────────────
async function loadPlans() {
  const el=document.getElementById('plans-content');
  el.innerHTML='<div class="spin"></div>';
  try {
    const plans=await api('/plans');
    el.innerHTML=plans.map(p=>`<div class="card">
      <div style="font-weight:700;font-size:15px;margin-bottom:14px">📋 ${p.name}</div>
      <label class="f-lbl">Narxi (so'm)</label>
      <input class="f-inp" id="plan-price-${p.id}" value="${p.price}" type="number"/>
      <label class="f-lbl">Davomiyligi (kun)</label>
      <input class="f-inp" id="plan-days-${p.id}" value="${p.durationDays}" type="number"/>
      <button class="btn-p btn-sm" onclick="savePlan(${p.id})">💾 Saqlash</button>
    </div>`).join('');
  } catch(e){el.innerHTML=`<p style="color:var(--red);text-align:center;margin-top:48px">${e.message}</p>`;}
}
async function savePlan(id) {
  const price=parseInt(document.getElementById(`plan-price-${id}`).value);
  const durationDays=parseInt(document.getElementById(`plan-days-${id}`).value);
  try { await api(`/plans/${id}`,{method:'PUT',body:JSON.stringify({price,durationDays})}); showCustomAlert('✅ Saqlandi'); }
  catch(e){showCustomAlert('❌ '+e.message);}
}

// ── PROMOS ────────────────────────────────────────────────────────────
async function loadPromos() {
  const el=document.getElementById('promos-content');
  el.innerHTML='<div class="spin"></div>';
  try {
    const promos=await api('/promos');
    el.innerHTML=`<button class="btn-p" style="margin-bottom:12px" onclick="openNewPromoModal()">➕ Yangi promo</button>
    ${promos.map(p=>`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <b style="font-size:15px">${p.title}</b>
        <span class="pill" style="background:${p.isActive?'rgba(48,209,88,.15)':'var(--bg3)'};color:${p.isActive?'var(--green)':'var(--hint)'}">${p.isActive?'Faol':'Nofaol'}</span>
      </div>
      <div style="font-size:12px;color:var(--hint);margin-bottom:4px">${p.discountPercent?p.discountPercent+'% chegirma':''}${p.discountAmount?p.discountAmount.toLocaleString()+' so\'m chegirma':''}</div>
      <div style="font-size:12px;color:var(--hint);margin-bottom:12px">${p.validFrom} — ${p.validTo}</div>
      <div style="display:flex;gap:8px">
        <button class="btn-g btn-sm" style="flex:1" onclick='openEditPromoModal(${JSON.stringify(p).replace(/'/g,"&#39;")})'>✏️ Tahrirlash</button>
        <button class="btn-r btn-sm" style="flex:1" onclick="deletePromo(${p.id})">🗑 O'chirish</button>
      </div>
    </div>`).join('')||'<p style="color:var(--hint);text-align:center;margin-top:32px">Promo yo\'q</p>'}`;
  } catch(e){el.innerHTML=`<p style="color:var(--red);text-align:center;margin-top:48px">${e.message}</p>`;}
}

function promoFormHtml(p={}) {
  return `
    <label class="f-lbl">Nomi</label><input class="f-inp" id="promo-title" value="${p.title||''}" placeholder="Yozgi chegirma"/>
    <label class="f-lbl">Chegirma foiz (%)</label><input class="f-inp" id="promo-pct" value="${p.discountPercent||''}" type="number" placeholder="20"/>
    <label class="f-lbl">Chegirma miqdori (so'm)</label><input class="f-inp" id="promo-amt" value="${p.discountAmount||''}" type="number" placeholder="50000"/>
    <label class="f-lbl">Boshlanish sanasi</label><input class="f-inp" id="promo-from" value="${p.validFrom||''}" type="date"/>
    <label class="f-lbl">Tugash sanasi</label><input class="f-inp" id="promo-to" value="${p.validTo||''}" type="date"/>
    <label style="display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;font-size:14px"><input type="checkbox" id="promo-active" ${p.isActive!==false?'checked':''}/> Faol</label>`;
}
function promoFormData() {
  return {title:document.getElementById('promo-title').value.trim(),discountPercent:parseInt(document.getElementById('promo-pct').value)||null,discountAmount:parseInt(document.getElementById('promo-amt').value)||null,validFrom:document.getElementById('promo-from').value,validTo:document.getElementById('promo-to').value,isActive:document.getElementById('promo-active').checked};
}
function openNewPromoModal() {
  openModal(`<div style="font-weight:700;font-size:17px;margin-bottom:16px">➕ Yangi promo</div>${promoFormHtml()}
    <div style="display:flex;gap:8px;margin-top:4px"><button class="btn-g" style="flex:1" onclick="closeModal()">Bekor</button><button class="btn-p" style="flex:1" onclick="createPromo()">Yaratish</button></div>`);
}
function openEditPromoModal(p) {
  const data=typeof p==='string'?JSON.parse(p):p;
  openModal(`<div style="font-weight:700;font-size:17px;margin-bottom:16px">✏️ Promoни tahrirlash</div>${promoFormHtml(data)}
    <div style="display:flex;gap:8px;margin-top:4px"><button class="btn-g" style="flex:1" onclick="closeModal()">Bekor</button><button class="btn-p" style="flex:1" onclick="updatePromo(${data.id})">Saqlash</button></div>`);
}
async function createPromo() {
  const data=promoFormData();
  if (!data.title||!data.validFrom||!data.validTo){showCustomAlert('Nomi va sanalar kiritilishi shart');return;}
  try { await api('/promos',{method:'POST',body:JSON.stringify(data)}); closeModal(); showCustomAlert('✅ Promo yaratildi'); loadPromos(); }
  catch(e){showCustomAlert('❌ '+e.message);}
}
async function updatePromo(id) {
  try { await api(`/promos/${id}`,{method:'PUT',body:JSON.stringify(promoFormData())}); closeModal(); showCustomAlert('✅ Saqlandi'); loadPromos(); }
  catch(e){showCustomAlert('❌ '+e.message);}
}
async function deletePromo(id) {
  showCustomConfirm('Promoni o\'chirmoqchimisiz?', async confirmed=>{
    if (!confirmed) return;
    try { await api(`/promos/${id}`,{method:'DELETE'}); showCustomAlert('✅ O\'chirildi'); loadPromos(); }
    catch(e){showCustomAlert('❌ '+e.message);}
  });
}

// ── TABS ──────────────────────────────────────────────────────────────
const TABS=['stats','clinics','payments','plans','promos'];
let curTab='stats';
const loaded={};
function switchTab(tab){
  curTab=tab;
  TABS.forEach(t=>{ document.getElementById('sec-'+t).classList.toggle('active',t===tab); document.getElementById('tab-'+t).classList.toggle('on',t===tab); });
  if(!loaded[tab]){loaded[tab]=true;loadFn(tab);}
}
function loadFn(tab){ if(tab==='stats')loadStats(); else if(tab==='clinics')loadClinics(); else if(tab==='payments')loadPayments(); else if(tab==='plans')loadPlans(); else if(tab==='promos')loadPromos(); }
function refreshTab(){ delete loaded[curTab]; loadFn(curTab); }
loaded['stats']=true; loadStats();
</script>
</body>
</html>
