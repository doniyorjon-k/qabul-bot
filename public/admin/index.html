<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Admin Panel</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:  var(--tg-theme-bg-color,#1c1c1e);
      --bg2: var(--tg-theme-secondary-bg-color,#2c2c2e);
      --txt: var(--tg-theme-text-color,#fff);
      --hint:var(--tg-theme-hint-color,#8e8e93);
      --btn: var(--tg-theme-button-color,#007aff);
      --btn-txt:var(--tg-theme-button-text-color,#fff);
      --red: var(--tg-theme-destructive-text-color,#ff3b30);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--txt);font-family:-apple-system,sans-serif;margin:0;padding-bottom:72px}
    .card{background:var(--bg2);border-radius:14px;padding:14px;margin-bottom:10px}
    .hint{color:var(--hint)}
    .section{display:none}.section.active{display:block}
    .spin{border:2px solid var(--bg2);border-top-color:var(--btn);border-radius:50%;width:28px;height:28px;animation:sp .7s linear infinite;margin:48px auto}
    @keyframes sp{to{transform:rotate(360deg)}}
    .tab-bar{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--bg2);border-top:1px solid rgba(142,142,147,.25);z-index:20}
    .tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;gap:2px;border:none;background:none;color:var(--hint);font-size:10px;cursor:pointer}
    .tab.on{color:var(--btn)}
    .tab svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.7}
    .btn-red{background:var(--red);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
    .btn-gray{background:var(--bg);color:var(--hint);border:none;border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;z-index:50}
    .modal.hidden{display:none}
    .modal-box{background:var(--bg2);border-radius:18px 18px 0 0;width:100%;padding:20px}
    .stars{color:#f59e0b;font-size:16px;letter-spacing:1px}
    .bar-wrap{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;flex:1}
    .bar-fill{height:100%;border-radius:4px;background:var(--btn);transition:width .4s}
    input[type=search]{background:var(--bg2);color:var(--txt);border:none;border-radius:12px;padding:10px 14px;width:100%;font-size:15px;outline:none}
    input[type=search]::placeholder{color:var(--hint)}
    .badge{font-size:10px;font-weight:700;color:#fff;padding:1px 6px;border-radius:99px}
    .badge-confirmed{background:#34c759}
    .badge-cancelled{background:var(--red)}
    .badge-completed{background:#636366}
    .badge-pending{background:#ff9500}
  </style>
</head>
<body>

<div style="position:sticky;top:0;z-index:10;background:var(--bg);padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between">
  <span style="font-size:17px;font-weight:600">👨‍⚕️ Admin panel</span>
  <button onclick="refreshTab()" style="background:none;border:none;color:var(--btn);font-size:13px;cursor:pointer">↻ Yangilash</button>
</div>

<div style="padding:0 14px">

  <!-- BUGUN -->
  <div id="sec-today" class="section active">
    <div id="today-content"><div class="spin"></div></div>
  </div>

  <!-- HAFTA -->
  <div id="sec-week" class="section">
    <div id="week-content"><div class="spin"></div></div>
  </div>

  <!-- STATISTIKA -->
  <div id="sec-stats" class="section">
    <div id="stats-content"><div class="spin"></div></div>
  </div>

  <!-- FIKRLAR -->
  <div id="sec-reviews" class="section">
    <div id="reviews-content"><div class="spin"></div></div>
  </div>

  <!-- QIDIRISH -->
  <div id="sec-search" class="section">
    <div style="padding:8px 0 12px">
      <input type="search" id="search-input" placeholder="Ism yoki telefon raqam..." oninput="onSearch(this.value)"/>
    </div>
    <div id="search-content"><div id="search-hint" class="hint text-center" style="margin-top:32px;font-size:14px">Qidirish uchun yozing...</div></div>
  </div>

</div>

<!-- Cancel Modal -->
<div id="cancel-modal" class="modal hidden">
  <div class="modal-box">
    <p style="font-weight:600;margin:0 0 12px">Bekor qilish sababi</p>
    <textarea id="cancel-reason" rows="3" placeholder="Sabab (ixtiyoriy)..."
      style="width:100%;background:var(--bg);color:var(--txt);border:1px solid var(--hint);border-radius:10px;padding:10px;font-size:14px;resize:none;outline:none"></textarea>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button class="btn-gray" onclick="closeModal()" style="flex:1">Bekor</button>
      <button class="btn-red" onclick="confirmCancel()" style="flex:1">Qabulni bekor qil</button>
    </div>
  </div>
</div>

<!-- Tab Bar -->
<nav class="tab-bar">
  <button class="tab on" id="tab-today" onclick="switchTab('today')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Bugun
  </button>
  <button class="tab" id="tab-week" onclick="switchTab('week')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
    Hafta
  </button>
  <button class="tab" id="tab-stats" onclick="switchTab('stats')">
    <svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    Statistika
  </button>
  <button class="tab" id="tab-reviews" onclick="switchTab('reviews')">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    Fikrlar
  </button>
  <button class="tab" id="tab-search" onclick="switchTab('search')">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Qidirish
  </button>
</nav>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
const initData = tg.initData;

// ── API ────────────────────────────────────────────────────────────
function api(path, opts={}) {
  return fetch('/api/admin'+path, {
    ...opts,
    headers:{'x-init-data':initData,'Content-Type':'application/json',...(opts.headers||{})},
  }).then(async r => {
    if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e.message||r.statusText); }
    return r.json();
  });
}

// ── Helpers ────────────────────────────────────────────────────────
const fmtDate = s => { if(!s)return''; const[y,m,d]=s.split('-'); return`${d}.${m}.${y}`; };
const fmtTime = t => { if(!t)return''; const[h,m]=t.split(':'); return m==='00'?`${+h}:00`:`${+h}:${m}`; };
const isPast  = (d,t) => new Date(`${d}T${t}:00+05:00`)<=new Date();
const cantCancel=(d,t)=> new Date(`${d}T${t}:00+05:00`)-new Date() <= 30*60*1000;

const STATUS_LABEL = {confirmed:'Tasdiqlangan',cancelled:'Bekor',completed:'Yakunlangan',pending:'Kutilmoqda'};
const STATUS_CLASS = {confirmed:'badge-confirmed',cancelled:'badge-cancelled',completed:'badge-completed',pending:'badge-pending'};

const stars = n => '⭐'.repeat(n) + '☆'.repeat(5-n);

// ── Cancel Modal ───────────────────────────────────────────────────
let cancelId=null;
function openCancel(id){ cancelId=id; document.getElementById('cancel-reason').value=''; document.getElementById('cancel-modal').classList.remove('hidden'); }
function closeModal(){ document.getElementById('cancel-modal').classList.add('hidden'); cancelId=null; }
async function confirmCancel(){
  if(!cancelId)return;
  const reason=document.getElementById('cancel-reason').value.trim();
  try{
    await api(`/appointments/${cancelId}/cancel`,{method:'POST',body:JSON.stringify({reason})});
    closeModal(); tg.showAlert('✅ Qabul bekor qilindi'); refreshTab();
  }catch(e){ tg.showAlert('❌ '+e.message); }
}

// ── Apt Card ───────────────────────────────────────────────────────
function aptCard(a, showCancel=true){
  const past=isPast(a.timeSlot.date,a.timeSlot.time);
  const cant=cantCancel(a.timeSlot.date,a.timeSlot.time);
  const st=past?'completed':(a.status||'confirmed');
  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="min-width:0">
        <div style="font-weight:600;font-size:14px">🦷 ${a.service?.name||'—'}</div>
        <div class="hint" style="font-size:12px;margin-top:2px">📅 ${fmtDate(a.timeSlot.date)} · ⏰ ${fmtTime(a.timeSlot.time)}</div>
        <div style="font-size:14px;margin-top:6px">👤 ${a.clientName||'—'}</div>
        <div class="hint" style="font-size:12px">📱 ${a.clientPhone||'—'}</div>
      </div>
      <span class="badge ${STATUS_CLASS[st]||'badge-confirmed'}">${STATUS_LABEL[st]||st}</span>
    </div>
    ${showCancel&&!past&&!cant?`<div style="margin-top:10px"><button class="btn-red" onclick="openCancel(${a.id})">❌ Bekor qilish</button></div>`:''}
    ${showCancel&&!past&&cant&&a.status!=='cancelled'?`<div class="hint" style="font-size:12px;margin-top:8px">⏳ 30 daqiqadan kam vaqt qoldi</div>`:''}
  </div>`;
}

// ── TODAY ──────────────────────────────────────────────────────────
async function loadToday(){
  const el=document.getElementById('today-content');
  el.innerHTML='<div class="spin"></div>';
  try{
    const list=await api('/appointments/today');
    if(!list.length){ el.innerHTML='<p class="hint" style="text-align:center;margin-top:48px;font-size:14px">Bugun uchun qabul yo\'q</p>'; return; }
    const now=new Date();
    const future=list.filter(a=>new Date(`${a.timeSlot.date}T${a.timeSlot.time}:00+05:00`)>now);
    const done  =list.filter(a=>new Date(`${a.timeSlot.date}T${a.timeSlot.time}:00+05:00`)<=now);
    let html='';
    if(future.length){ html+=`<div class="hint" style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 8px">Kelgusi (${future.length})</div>`; html+=future.map(a=>aptCard(a)).join(''); }
    if(done.length){ html+=`<div class="hint" style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 8px">Yakunlangan (${done.length})</div>`; html+=done.map(a=>aptCard(a,false)).join(''); }
    el.innerHTML=html;
  }catch(e){ el.innerHTML=`<p style="color:var(--red);text-align:center;margin-top:48px;font-size:13px">${e.message}</p>`; }
}

// ── WEEK ───────────────────────────────────────────────────────────
const UZ_DAYS=['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];
async function loadWeek(){
  const el=document.getElementById('week-content');
  el.innerHTML='<div class="spin"></div>';
  try{
    const list=await api('/appointments/week');
    if(!list.length){ el.innerHTML='<p class="hint" style="text-align:center;margin-top:48px;font-size:14px">Qabullar yo\'q</p>'; return; }
    let html='',prev='';
    for(const a of list){
      if(a.timeSlot.date!==prev){
        prev=a.timeSlot.date;
        const day=UZ_DAYS[new Date(a.timeSlot.date+'T00:00:00+05:00').getDay()];
        html+=`<div class="hint" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px">${fmtDate(a.timeSlot.date)} · ${day}</div>`;
      }
      html+=aptCard(a);
    }
    el.innerHTML=html;
  }catch(e){ el.innerHTML=`<p style="color:var(--red);text-align:center;margin-top:48px;font-size:13px">${e.message}</p>`; }
}

// ── STATS ──────────────────────────────────────────────────────────
let monthChart=null, ratingChart=null;
async function loadStats(){
  const el=document.getElementById('stats-content');
  el.innerHTML='<div class="spin"></div>';
  try{
    const s=await api('/stats');
    const m=s.monthly||[];
    const rv=s.reviewStats||{total:0,avg:0};
    const UZ_MONTHS={};
    ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].forEach((n,i)=>UZ_MONTHS[String(i+1).padStart(2,'0')]=n);
    const mLabels=m.map(x=>{ const[,mon]=x.month.split('-'); return UZ_MONTHS[mon]||mon; });
    const mData=m.map(x=>x.count);
    el.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div class="card" style="text-align:center"><div style="font-size:28px;font-weight:700;color:var(--btn)">${s.users}</div><div class="hint" style="font-size:11px;margin-top:2px">👥 Foydalanuvchilar</div></div>
      <div class="card" style="text-align:center"><div style="font-size:28px;font-weight:700">${s.total}</div><div class="hint" style="font-size:11px;margin-top:2px">📋 Jami qabullar</div></div>
      <div class="card" style="text-align:center"><div style="font-size:28px;font-weight:700;color:#34c759">${s.confirmed}</div><div class="hint" style="font-size:11px;margin-top:2px">✅ Tasdiqlangan</div></div>
      <div class="card" style="text-align:center"><div style="font-size:28px;font-weight:700;color:#ff9500">${s.completed}</div><div class="hint" style="font-size:11px;margin-top:2px">✔️ Yakunlangan</div></div>
      <div class="card" style="text-align:center;grid-column:span 2"><div style="font-size:28px;font-weight:700;color:var(--red)">${s.cancelled}</div><div class="hint" style="font-size:11px;margin-top:2px">❌ Bekor qilingan</div></div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="font-weight:600;font-size:14px;margin-bottom:12px">📈 Oylik qabullar</div>
      ${m.length?`<canvas id="month-chart" height="160"></canvas>`:'<p class="hint" style="text-align:center;font-size:13px">Ma\'lumot yo\'q</p>'}
    </div>
    <div class="card">
      <div style="font-weight:600;font-size:14px;margin-bottom:4px">⭐ Mijozlar bahosi</div>
      <div style="font-size:13px;margin-bottom:12px"><span style="font-size:22px;font-weight:700;color:#f59e0b">${rv.avg}</span> / 5 &nbsp;·&nbsp; ${rv.total} ta baho</div>
      <canvas id="rating-chart" height="120"></canvas>
    </div>`;

    if(m.length){
      if(monthChart){monthChart.destroy();}
      monthChart=new Chart(document.getElementById('month-chart'),{
        type:'bar',
        data:{labels:mLabels,datasets:[{data:mData,backgroundColor:'rgba(0,122,255,.7)',borderRadius:6,borderSkipped:false}]},
        options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#8e8e93',font:{size:11}}},y:{grid:{color:'rgba(255,255,255,.07)'},ticks:{color:'#8e8e93',font:{size:11},stepSize:1}}}}
      });
    }
    if(ratingChart){ratingChart.destroy();}
    ratingChart=new Chart(document.getElementById('rating-chart'),{
      type:'bar',
      data:{labels:['1⭐','2⭐','3⭐','4⭐','5⭐'],datasets:[{data:[0,0,0,0,0],backgroundColor:'rgba(245,158,11,.75)',borderRadius:6,borderSkipped:false}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#8e8e93',font:{size:11}}},y:{grid:{color:'rgba(255,255,255,.07)'},ticks:{color:'#8e8e93',font:{size:11},stepSize:1}}}}
    });
    // rating distribution
    api('/reviews').then(reviews=>{
      const dist=[0,0,0,0,0];
      reviews.forEach(r=>{ if(r.rating>=1&&r.rating<=5) dist[r.rating-1]++; });
      ratingChart.data.datasets[0].data=dist;
      ratingChart.update();
    }).catch(()=>{});
  }catch(e){ el.innerHTML=`<p style="color:var(--red);text-align:center;margin-top:48px;font-size:13px">${e.message}</p>`; }
}

// ── REVIEWS ────────────────────────────────────────────────────────
async function loadReviews(){
  const el=document.getElementById('reviews-content');
  el.innerHTML='<div class="spin"></div>';
  try{
    const list=await api('/reviews');
    if(!list.length){ el.innerHTML='<p class="hint" style="text-align:center;margin-top:48px;font-size:14px">Hali fikr yo\'q</p>'; return; }
    el.innerHTML=list.map(r=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:18px;letter-spacing:1px">${stars(r.rating)}</span>
        <span class="hint" style="font-size:12px">${r.appointmentDate?fmtDate(r.appointmentDate):''}</span>
      </div>
      <div style="font-size:14px;margin-top:6px">👤 ${r.clientName||'—'}</div>
      ${r.serviceName?`<div class="hint" style="font-size:12px">🦷 ${r.serviceName}</div>`:''}
      ${r.comment?`<div style="font-size:14px;margin-top:8px;padding:10px;background:var(--bg);border-radius:8px;line-height:1.4">"${r.comment}"</div>`:''}
    </div>`).join('');
  }catch(e){ el.innerHTML=`<p style="color:var(--red);text-align:center;margin-top:48px;font-size:13px">${e.message}</p>`; }
}

// ── SEARCH ─────────────────────────────────────────────────────────
let searchTimer=null;
async function onSearch(val){
  clearTimeout(searchTimer);
  const el=document.getElementById('search-content');
  const hint=document.getElementById('search-hint');
  if(!val||val.trim().length<2){
    el.innerHTML='<div id="search-hint" class="hint" style="text-align:center;margin-top:32px;font-size:14px">Kamida 2 ta belgi kiriting</div>';
    return;
  }
  searchTimer=setTimeout(async()=>{
    el.innerHTML='<div class="spin"></div>';
    try{
      const list=await api('/appointments/search?q='+encodeURIComponent(val.trim()));
      if(!list.length){ el.innerHTML='<p class="hint" style="text-align:center;margin-top:48px;font-size:14px">Topilmadi</p>'; return; }
      el.innerHTML=list.map(a=>aptCard(a)).join('');
    }catch(e){ el.innerHTML=`<p style="color:var(--red);text-align:center;font-size:13px;margin-top:32px">${e.message}</p>`; }
  },400);
}

// ── Tabs ───────────────────────────────────────────────────────────
const TABS=['today','week','stats','reviews','search'];
let curTab='today';
const loaded={};

function switchTab(tab){
  curTab=tab;
  TABS.forEach(t=>{
    document.getElementById('sec-'+t).classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).classList.toggle('on',t===tab);
  });
  if(!loaded[tab]){ loaded[tab]=true; loadTabFn(tab); }
}

function loadTabFn(tab){
  if(tab==='today')loadToday();
  else if(tab==='week')loadWeek();
  else if(tab==='stats')loadStats();
  else if(tab==='reviews')loadReviews();
}

function refreshTab(){ delete loaded[curTab]; loadTabFn(curTab); }

// init
loaded['today']=true;
loadToday();
</script>
</body>
</html>
